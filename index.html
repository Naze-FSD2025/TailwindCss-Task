<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Event Booking</title>

<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Link CSS file -->
<link rel="stylesheet" href="eventupdate.css">

</head>

<body class="flex justify-center mt-16">

<div class="bg-fuchsia-100 border-4 border-fuchsia-800 rounded p-8 w-[750px] shadow-md hover:shadow-xl transition text-purple-900">

    
<h1 class="text-3xl text-center font-semibold mb-2">Event 1</h1>

<p class="text-center mb-6">
Number of available seats: <b>23</b>
</p>

<div class="border-2 border-fuchsia-800 rounded p-6 shadow-md hover:shadow-md transition flex gap-10">

<!-- Image -->
<div class="image-box">
Image
</div>

<!-- Form -->
<form class="flex-1">

<div class="grid grid-cols-2 gap-4 items-center mb-3" >
<label class="block text-right">Name:</label>
<input type="text" class="border w-full p-1">
</div>

<div class="grid grid-cols-2 gap-4 items-center mb-3">
<label class="block text-right">Email:</label>
<input type="email" class="border w-full p-1">
</div>

<div class="grid grid-cols-2 gap-4 items-center mb-3">
<label class="block text-right">Phone No:</label>
<input type="tel" class="border w-full p-1">
</div>

<div class="grid grid-cols-2 gap-4 items-center mb-3">
<label class="block text-right">Number of seats:</label>
<select id="seats" class="border p-1 w-20"></select>
</div>

<div class="grid grid-cols-2 gap-4 items-center mb-3">
<label class="block text-right">Name of Attendee 2:</label>
<input type="text" class="border w-full p-1">
</div>

<!-- Buttons -->
<div class="flex justify-center gap-6 mt-6">

<button type="submit"
class="border px-6 py-1 rounded bg-purple-400 hover:bg-purple-300">
Submit
</button>

<button type="reset"
class="border px-6 py-1 rounded bg-zinc-300 hover:bg-zinc-100">
Cancel
</button>

</div>

</form>

</div>
</div>

<!-- Link JS file -->
<script src="eventupdate.js"></script>

</body>
</html>
